[icedos.desktop]
accentColor = "" # Accepts a libadwaita name (blue/teal/green/yellow/orange/red/pink/purple/slate), a base16 slot (base08..base0F, only meaningful when stylix is on), or a hex (RRGGBB / #RRGGBB). Empty defaults to "purple". Under GNOME, non-name inputs trigger a warning since GNOME's accent-color dconf key only accepts named values.
autologinUser = ""
timezone = "Europe/Bucharest"
wallpaper = "" # Absolute path to image. Empty = user/UI-managed (no rebuild override).

[icedos.desktop.bookmarks]
extras = []
documents = true
downloads = true
music = true
pictures = true
public = true
templates = true
videos = true

[icedos.desktop.windows]
activeHint = true
activeHintSize = 1
maximizeButton = true
minimizeButton = true

[icedos.desktop.users.username.idle.disableMonitors]
enable = true
seconds = 600

[icedos.desktop.users.username.idle.lock]
enable = true
seconds = 900

[icedos.desktop.users.username.idle.suspend]
enable = true
seconds = 1800
