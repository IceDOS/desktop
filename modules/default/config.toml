[icedos.desktop]
accentColor = "" # Accepts a libadwaita name (blue/teal/green/yellow/orange/red/pink/purple/slate), a base16 slot (base08..base0F, only meaningful when stylix is on), or a hex (RRGGBB / #RRGGBB). Empty defaults to "purple". Under GNOME, non-name inputs trigger a warning since GNOME's accent-color dconf key only accepts named values.
autologinUser = ""
keyboardLayouts = [] # xkb layouts, e.g. ["us", "gr"] (first is primary). Empty = leave each DE at its own default (no layout override).
timezone = "Europe/Bucharest"
wallpaper = "" # Absolute path to image. Empty = user/UI-managed (no rebuild override).

[icedos.desktop.clock]
date = false # Show the month and day of the month on the clock
firstDayOfTheWeek = "monday" # monday, tuesday, wednesday, thursday, friday, saturday, sunday
hourFormat24 = true # false = 12-hour AM/PM
seconds = true
weekday = false # Show the day of the week on the clock

[icedos.desktop.bookmarks]
extras = []
documents = true
downloads = true
music = true
pictures = true
public = true
templates = true
videos = true

[icedos.desktop.windows]
activeHint = true
activeHintSize = 1
maximizeButton = true
minimizeButton = true

[icedos.desktop.windows.focus]
delay = 300 # ms; only applies when focus follows the mouse
followsMouse = false # Focus follows the mouse cursor instead of click-to-focus

[icedos.desktop.users.username.idle.disableMonitors]
enable = true
seconds = 600

[icedos.desktop.users.username.idle.lock]
enable = true
seconds = 900

[icedos.desktop.users.username.idle.suspend]
enable = true
seconds = 1800
